# Harmonia - Modular AI & Data Platform - Docker Compose Base Entrypoint
# ============================================
#
# This is the canonical base configuration for Harmonia - Modular AI & Data Platform.
# It defines the core infrastructure layer that all other services depend on.
#
# Core services included:
# - Traefik (reverse proxy & service discovery)
# - PostgreSQL (relational database)
# - MongoDB (document store)
# - Qdrant (vector database)
# - MinIO (S3-compatible object storage)
#
# Optional overlays (compose with -f flag):
# - docker-compose.tools.yml          → OpenWebUI, MLflow, Adminer, Dashboard
# - docker-compose.monitoring.yml     → Prometheus, Grafana, cAdvisor
# - docker-compose.orchestration.yml  → Prefect, Dagster workflow orchestration
# - docker-compose.sqlserver.yml      → SQL Server (optional heavy database)
# - docker-compose.runtime.ollama.base.yml + variant → Ollama LLM runtime
# - docker-compose.dev-core.yml       → Core service developer port exposure
# - docker-compose.dev-orchestration.yml → Orchestration service developer port exposure
# - docker-compose.dev-sqlserver.yml  → SQL Server developer port exposure
#
# Quick start:
#   docker compose -f docker-compose.yml -f docker-compose.tools.yml up -d
#
# Full stack with monitoring:
#   docker compose -f docker-compose.yml -f docker-compose.tools.yml -f docker-compose.monitoring.yml up -d
#
# With Ollama (AMD GPU):
#   docker compose -f docker-compose.yml -f docker-compose.runtime.ollama.base.yml -f docker-compose.runtime.ollama.rocm.yml -f docker-compose.tools.yml up -d

x-default-env: &default-env
  TZ: ${TZ:-UTC}

networks:
  ai-infra:
    name: ai-infra-net
  ai-public:
    name: ai-public-net

services:

  # =========================================================================
  # TRAEFIK - Reverse Proxy & Service Discovery
  # =========================================================================
  # Acts as the HTTP entrypoint for the entire platform.
  # Dynamically discovers Docker containers via Docker API.
  # Routes traffic based on container labels.
  #
  # Dashboard: http://127.0.0.1:8088/dashboard/
  # =========================================================================
  traefik:
    image: traefik:v3
    user: "0"
    profiles: ["infra"]
    environment:
      - NO_PROXY=host.docker.internal,localhost,127.0.0.1,192.168.65.254
      - no_proxy=host.docker.internal,localhost,127.0.0.1,192.168.65.254
      - HTTP_PROXY=
      - http_proxy=
      - HTTPS_PROXY=
      - https_proxy=
    env_file:
      - ../config/env/.env
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entryPoints.traefik.address=:8080
      - --providers.docker=true
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=ai-public-net
      - --entryPoints.web.address=:80
      - --entryPoints.websecure.address=:443
      - --metrics.prometheus=true
      - --metrics.prometheus.addrouterslabels=true
      - --metrics.prometheus.addserviceslabels=true
      - --metrics.prometheus.entrypoint=traefik
      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
      - "8088:8080"
    networks:
      - ai-infra
      - ai-public
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # =========================================================================
  # QDRANT - Vector Database
  # =========================================================================
  # Semantic search and vector storage for RAG systems.
  # Accessible via Traefik at: http://qdrant.localhost/dashboard
  # =========================================================================
  qdrant:
    image: qdrant/qdrant:v1.11.0
    profiles: ["infra"]
    env_file:
      - ../config/env/.env
    volumes:
      - ../volumes/qdrant:/qdrant/storage
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qdrant.rule=Host(`qdrant.localhost`)"
      - "traefik.http.routers.qdrant.entrypoints=web"
      - "traefik.http.services.qdrant.loadbalancer.server.port=6333"
      - "traefik.http.middlewares.qdrant-redirect.redirectregex.regex=^http://qdrant\\.localhost/$"
      - "traefik.http.middlewares.qdrant-redirect.redirectregex.replacement=http://qdrant.localhost/dashboard"
      - "traefik.http.routers.qdrant.middlewares=qdrant-redirect"
    healthcheck:
      disable: true
    networks:
      - ai-infra
      - ai-public
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "8g"
        reservations:
          cpus: "1"
          memory: "2g"
    restart: unless-stopped

  # =========================================================================
  # MINIO - S3-Compatible Object Storage
  # =========================================================================
  # Artifact storage for MLflow, datasets, and general file storage.
  # Console: http://minio.localhost
  # =========================================================================
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    profiles: ["infra"]
    env_file:
      - ../config/env/.env
    command: server /data --console-address ":9001"
    environment:
      <<: *default-env
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ../volumes/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-console.rule=Host(`${MINIO_CONSOLE_HOST:-minio.localhost}`)"
      - "traefik.http.routers.minio-console.entrypoints=web"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    networks:
      - ai-infra
      - ai-public
    restart: unless-stopped

  # =========================================================================
  # MINIO-INIT - MinIO Bucket Initialization
  # =========================================================================
  # One-shot container that creates required buckets and policies.
  # Runs once at startup, then exits.
  # =========================================================================
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    profiles: ["infra"]
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ../config/env/.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKETS: ${MINIO_BUCKETS}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        echo "Configuring MinIO..."
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "waiting for minio..."
          sleep 2
        done
        for bucket in $$(echo "$$MINIO_BUCKETS" | tr ',' ' '); do
          mc mb --ignore-existing local/$$bucket
        done
        mc anonymous set download local/artifacts || true
        echo "MinIO init done."
    networks:
      - ai-infra
    restart: "no"

  # =========================================================================
  # POSTGRESQL - Relational Database
  # =========================================================================
  # Primary database for MLflow backend, application metadata, and structured data.
  # Internal only (no direct Traefik routing).
  # =========================================================================
  postgres:
    image: postgres:16.2
    profiles: ["infra"]
    env_file:
      - ../config/env/.env
    environment:
      <<: *default-env
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ../volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-infra
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4g"
        reservations:
          cpus: "0.5"
          memory: "1g"
    restart: unless-stopped

  # =========================================================================
  # MONGODB - Document Store
  # =========================================================================
  # Document-oriented database for flexible schema data storage.
  # Internal only (no direct Traefik routing).
  # =========================================================================
  mongodb:
    image: mongo:7.0.15
    profiles: ["infra"]
    env_file:
      - ../config/env/.env
    environment:
      <<: *default-env
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - ../volumes/mongodb:/data/db
    networks:
      - ai-infra
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4g"
        reservations:
          cpus: "0.5"
          memory: "1g"
    restart: unless-stopped

  # =========================================================================
  # DASHBOARD - Platform Control Plane
  # =========================================================================
  # Simple nginx-based dashboard for platform overview and service links.
  # Accessible via Traefik at: http://ai.localhost
  # =========================================================================
  dashboard:
    image: nginx:alpine
    profiles: ["infra"]
    networks:
      - ai-public
      - ai-infra
    volumes:
      - ../platform/tools/dashboard:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-dashboard.rule=Host(`ai.localhost`)"
      - "traefik.http.routers.ai-dashboard.entrypoints=web"
      - "traefik.http.services.ai-dashboard.loadbalancer.server.port=80"
    restart: unless-stopped
